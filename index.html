<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Brand Manual</title>

  <!-- PRELOAD FIRST PAGE -->

  <link
    rel="preload"
    as="image"
    href="assets/pages/page_00.png"
  />

  <!-- STYLES -->

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>
  
<body>

  <!-- LOADER -->

  <div id="loader" class="loader">

    <div class="loader-content">
      <h1>Brand Manual</h1>
      <p>loading pages...</p>
    </div>

  </div>

  <!-- VIEWER -->

  <main class="viewer">

    <div class="page-container">

      <img
        id="page"
        class="page-image"
        src="assets/pages/page_00.png"
        alt="Brand Manual Page"
      />

      <button
        id="prevBtn"
        class="nav-button prev"
        aria-label="Previous page"
      >
        ←
      </button>

      <button
        id="nextBtn"
        class="corner-button"
        aria-label="Next page"
      >
      </button>

    </div>

  </main>

  <script src="js/app.js"></script>

</body>
